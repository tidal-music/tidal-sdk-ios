name: Run Unit Tests

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - '**'

  merge_group:
    types: [checks_requested]

env:
  IOS_SIMULATOR_DESTINATION: 'platform=iOS Simulator,name=iPhone 17,OS=26.2'

jobs:
  run-swift-tests:
    name: Run Swift Unit Tests
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2'
    - name: Run tests
      run: |-
        set -o pipefail && swift test --skip PlayerTests | xcbeautify --renderer github-actions

  run-xcodebuild-tests:
    name: Run xcodebuild Unit Tests
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2'
    # -parallel-testing-enabled NO: PlayerTests use Swift Testing, which runs in
    # parallel by default. Several suites share process-global state (PlayerWorld,
    # the JsonEncodedResponseURLProtocol URL mock), so they must run serially.
    - name: Run Player tests (xcodebuild)
      run: |-
        set -o pipefail && xcodebuild -scheme 'Player' -sdk iphonesimulator -destination "$IOS_SIMULATOR_DESTINATION" test -parallel-testing-enabled NO -skip-testing:PlayerTests/PlayLogTests -skip-testing:PlayerTests/PlayLogWithDeinitTests -skipPackagePluginValidation | xcbeautify --renderer github-actions

  build-test-apps:
    name: Build Test Apps
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26.2'
    - name: Build Player test app
      run: |-
        set -o pipefail && xcodebuild -project TestApps/Player/PlayerTestApp.xcodeproj -scheme PlayerTestApp -destination "$IOS_SIMULATOR_DESTINATION" build -skipPackagePluginValidation CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO | xcbeautify --renderer github-actions

    - name: Build Auth test app
      run: |-
        set -o pipefail && xcodebuild -project TestApps/Auth/AuthTestApp.xcodeproj -scheme AuthTestApp -destination "$IOS_SIMULATOR_DESTINATION" build -skipPackagePluginValidation CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO | xcbeautify --renderer github-actions
