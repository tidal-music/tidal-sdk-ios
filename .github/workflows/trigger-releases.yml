name: Trigger Releases
on:
  push:
    branches:
      - main

jobs: 
  check-bump:
    runs-on: ubuntu-latest
    name: Check For Version Bump
    outputs:
      version: ${{ steps.check-version-bump.outputs.version }}
      bump-detected: ${{ steps.check-version-bump.outputs.bump_detected }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if version was bumped
        id: check-version-bump
        run: |
          set +e
          result="false"
          version="$(cat version.txt)"
          ./.agents/skills/prepare-release/scripts/check-version-bump.sh
          status=$?
          
          # check-version-bump exits with 0 for a bump, 1 for no bump, and >1 for errors.
          if [ "$status" = "0" ]; then
            result="true"
          elif [ "$status" != "1" ]; then
            exit "$status"
          fi
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "bump_detected=$result" >> $GITHUB_OUTPUT
          
  trigger-lint:
    name: Run Lint Checks
    needs: [ check-bump ]
    if: ${{ needs.check-bump.outputs.bump-detected == 'true' }}
    uses: ./.github/workflows/lint.yml
    permissions: 
      pull-requests: write
      contents: read
      
  trigger-unit-tests:
    name: Run Unit Tests
    needs: [ check-bump ]
    if: ${{ needs.check-bump.outputs.bump-detected == 'true' }}
    uses: ./.github/workflows/unit-test.yml

  trigger-release:
    name: Trigger release
    needs: [ check-bump, trigger-lint, trigger-unit-tests ]
    if: ${{ needs.check-bump.outputs.bump-detected == 'true' }}
    permissions: write-all
    uses: ./.github/workflows/create-release.yml
    with: 
        version: ${{ needs.check-bump.outputs.version }}
    secrets: inherit
